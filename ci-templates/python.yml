name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v4
        with:
          version: "latest"

      - name: Install dependencies
        run: uv sync --all-extras

      - name: Run tests
        run: uv run pytest -q --tb=short --junitxml=.boss/test-results/junit.xml

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: .boss/test-results/

  # Optional: BOSS 3-agent verification (requires ANTHROPIC_API_KEY secret)
  # Enable by setting BOSS_AGENTS=true in repository variables
  boss-verify:
    runs-on: ubuntu-latest
    needs: test
    if: vars.BOSS_AGENTS == 'true'
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v4
      - run: uv sync --all-extras
      - name: Download test results
        uses: actions/download-artifact@v4
        with:
          name: test-results-${{ github.sha }}
          path: .boss/test-results/
      - name: Run BOSS verification (Agent 2)
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: |
          pip install anthropic
          python scripts/boss-verify.py
      - name: Upload certification
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: certification-${{ github.sha }}
          path: .boss/certification.json
