name: E2E Tests

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  playwright:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 30
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - run: npm ci

      - name: Install Playwright browsers
        run: |
          if [ "$RUNNER_OS" = "Linux" ]; then
            npx playwright install --with-deps chromium
          else
            npx playwright install chromium
          fi

      - name: Run Playwright tests
        run: npx playwright test

      - name: Upload Playwright report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/

      - name: Upload screenshots
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: screenshots-${{ github.sha }}
          path: |
            tests/e2e/__snapshots__/
            .boss/test-results/screenshots/

      - name: BOSS notify
        if: always()
        env:
          BOSS_NOTIFY: ${{ vars.BOSS_NOTIFY }}
          BOSS_CI_STATUS: ${{ job.status }}
          BOSS_PR_URL: ${{ github.event.pull_request.html_url }}
          BOSS_TEST_SUMMARY: "E2E tests on ${{ github.sha }}"
        run: python3 scripts/notify.py 2>/dev/null || true

  comment-pr:
    runs-on: ubuntu-latest
    needs: playwright
    if: github.event_name == 'pull_request' && always()
    steps:
      - uses: actions/checkout@v4
      - name: Comment BOSS certification on PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOSS_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          [ -f .boss/certification.json ] || exit 0
          python3 -c "import json,subprocess,os,sys; cert=json.load(open('.boss/certification.json')); ok=cert.get('certified',False); p=str(cert.get('requirements_passed','?')); t=str(cert.get('requirements_total','?')); mark='certified' if ok else 'NOT certified'; msg='**BOSS '+mark+'** ('+p+'/'+t+' requirements)'; cov=cert.get('coverage_pct'); msg=(msg+' | coverage: '+str(int(cov))+'%') if cov is not None else msg; pr=os.environ.get('BOSS_PR_NUMBER',''); subprocess.run(['gh','pr','comment',pr,'--body',msg],capture_output=True) if pr else None" 2>/dev/null || true
