name: Test Suite

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Run tests
        run: go test ./... -v -coverprofile=.boss/test-results/coverage.out

      - name: Coverage report
        run: go tool cover -func=.boss/test-results/coverage.out

      - name: Upload test results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results-${{ github.sha }}
          path: .boss/test-results/

      - name: BOSS notify
        if: always()
        env:
          BOSS_NOTIFY: ${{ vars.BOSS_NOTIFY }}
          BOSS_CI_STATUS: ${{ job.status }}
          BOSS_PR_URL: ${{ github.event.pull_request.html_url }}
          BOSS_TEST_SUMMARY: "Tests on ${{ github.sha }}"
        run: python3 scripts/notify.py 2>/dev/null || true

  comment-pr:
    runs-on: ubuntu-latest
    needs: test
    if: github.event_name == 'pull_request' && always()
    steps:
      - uses: actions/checkout@v4
      - name: Comment BOSS certification on PR
        continue-on-error: true
        env:
          GH_TOKEN: ${{ github.token }}
          BOSS_PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          [ -f .boss/certification.json ] || exit 0
          python3 -c "import json,subprocess,os,sys; cert=json.load(open('.boss/certification.json')); ok=cert.get('certified',False); p=str(cert.get('requirements_passed','?')); t=str(cert.get('requirements_total','?')); mark='certified' if ok else 'NOT certified'; msg='**BOSS '+mark+'** ('+p+'/'+t+' requirements)'; cov=cert.get('coverage_pct'); msg=(msg+' | coverage: '+str(int(cov))+'%') if cov is not None else msg; pr=os.environ.get('BOSS_PR_NUMBER',''); subprocess.run(['gh','pr','comment',pr,'--body',msg],capture_output=True) if pr else None" 2>/dev/null || true
